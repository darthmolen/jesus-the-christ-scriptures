name: Release to Google Play

# Preferred deploy path: push a version tag and this builds, signs, and uploads the
# Android App Bundle to Google Play. See docs/android/HOW-TO-DEPLOY.md.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  # Which Play track to publish to. internal = no review, instant (safest default).
  # Change to "alpha" for closed testing, or "production" for public.
  PLAY_TRACK: internal
  PACKAGE_NAME: com.vozloop.jesusthechristscriptures.full
  APP_CSPROJ: src/JesusTheChrist.App/JesusTheChrist.App.csproj

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Guard — tag must match csproj version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CSPROJ_VER=$(grep -oPm1 '(?<=<ApplicationDisplayVersion>)[^<]+' "$APP_CSPROJ" | tr -d '\r')
          if [ -z "$CSPROJ_VER" ]; then
            echo "::error::Could not read <ApplicationDisplayVersion> from $APP_CSPROJ"
            exit 1
          fi
          echo "Tag version: $TAG / csproj ApplicationDisplayVersion: $CSPROJ_VER"
          if [ "$TAG" != "$CSPROJ_VER" ]; then
            echo "::error::Tag v$TAG does not match ApplicationDisplayVersion ($CSPROJ_VER). Bump the csproj versionName AND versionCode (via PR) before tagging."
            exit 1
          fi

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Publish signed AAB
        env:
          JTC_KEYSTORE: ${{ runner.temp }}/upload.keystore
          JTC_KEYSTORE_PASS: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
        run: dotnet publish "$APP_CSPROJ" -c Release -f net10.0-android

      - name: Locate the signed bundle
        id: aab
        run: |
          AAB=$(ls src/JesusTheChrist.App/bin/Release/net10.0-android/*-Signed.aab | head -n1)
          echo "Found: $AAB"
          echo "path=$AAB" >> "$GITHUB_OUTPUT"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ env.PLAY_TRACK }}
          status: completed
